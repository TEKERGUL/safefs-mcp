workspace:
  root: "."
  followSymlinks: false

limits:
  maxFileSizeMB: 50
  maxTimelineEventsWarning: 10000
  maxPatchSearchLength: 20000

# Add project-specific protected patterns here. SafeFS also enforces
# mandatory protected paths such as .git/, .safefs/, .env*, keys,
# package tokens, cloud credentials, secrets/, node_modules/, dist/,
# and build/ even if this list is empty.
protected:
  - ".git/**"
  - ".safefs/**"
  - ".env"
  - ".env.*"
  - "**/*.pem"
  - "**/*.key"
  - "**/*.p12"
  - "**/*.pfx"
  - "**/*.crt"
  - "**/*.cer"
  - "**/*.token"
  - ".npmrc"
  - ".pypirc"
  - ".ssh/**"
  - ".aws/**"
  - "credentials*"
  - "service-account*.json"
  - "**/id_rsa"
  - "**/id_ed25519"
  - "secrets/**"
  - "node_modules/**"
  - "dist/**"
  - "build/**"
  - ".next/**"
  - "coverage/**"

rollback:
  defaultDryRun: true
  conflictMode: "skip"

storage:
  objectCompression: false
  retentionWarningDays: 30
  retentionDays: 30
  autoprune: false

watch:
  intervalMs: 1000
  debounceMs: 750
  maxFileSizeMB: 5
  maxSnapshotBytesMB: 250
  respectGitignore: true
  exclude:
    - "node_modules/**"
    - "dist/**"
    - "build/**"
    - ".next/**"
    - "coverage/**"
    - ".cache/**"
    - "*.log"
    - "*.tmp"
    - "*.temp"
    - ".safefs_tmp_*"
